---
name: pylint

"on":
  push:
    branches:
      - main
  pull_request:

jobs:
  pylint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Running ruff
        run: |
          uv --no-config sync --locked --dev
          uv run ruff check certbrother.py
          uv run ruff check tests/
